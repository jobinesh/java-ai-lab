micronaut.application.name=task-agent
micronaut.server.port=8081

# MCP server to control tasks
agent.mcp.url=http://127.0.0.1:8080/mcp

# Micronaut LangChain4j OpenAI
langchain4j.open-ai.api-key={OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.0
